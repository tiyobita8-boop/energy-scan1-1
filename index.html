<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>エネルギー状態スキャン</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f5f5f5;
}

.container {
  width: 90%;
  max-width: 700px;
  margin: 20px auto;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

button {
  font-size: 18px;
  padding: 15px;
  margin: 10px;
  width: 80%;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 10px;
}

.result {
  margin-top: 20px;
  font-size: 16px;
  text-align: left;
}
</style>

</head>

<body>

<h1>🧠 エネルギー状態スキャン</h1>
<p>今の感覚を選択（複数OK）</p>

<div class="container">

<div class="card">

<label><input type="checkbox" value="だるい">だるい</label><br>
<label><input type="checkbox" value="重い">重い</label><br>
<label><input type="checkbox" value="眠い">眠い</label><br>

<label><input type="checkbox" value="イライラ">イライラ</label><br>
<label><input type="checkbox" value="怒り">怒り</label><br>
<label><input type="checkbox" value="ストレス">ストレス</label><br>

<label><input type="checkbox" value="不安">不安</label><br>
<label><input type="checkbox" value="苦しさ">苦しさ</label><br>

<label><input type="checkbox" value="悲しい">悲しい</label><br>

<label><input type="checkbox" value="モヤモヤ">モヤモヤ</label><br>
<label><input type="checkbox" value="焦り">焦り</label><br>
<label><input type="checkbox" value="混乱">混乱</label><br>

<label><input type="checkbox" value="無気力">無気力</label><br>
<label><input type="checkbox" value="やりたくない">やりたくない</label><br>

<label><input type="checkbox" value="口出しすぎ">口出しすぎ</label><br>
<label><input type="checkbox" value="攻撃性">攻撃性</label><br>
<label><input type="checkbox" value="話が聞けない">話が聞けない</label><br>

<label><input type="checkbox" value="きつい">きつい</label><br>

</div>

<button onclick="analyze()">分析する</button>

<div class="result" id="result"></div>

</div>

<script>

function analyze(){

  const checked = Array.from(document.querySelectorAll('input:checked')).map(el => el.value);

  let chakra = [];
  let meridian = [];
  let body = [];
  let subconscious = [];
  let healing = [];
  let action = [];

  checked.forEach(f => {

    // 怒り系
    if(["怒り","イライラ","攻撃性","ストレス"].includes(f)){
      chakra.push("第3チャクラ");
      meridian.push("肝経");
      body.push("アストラル体");

      subconscious.push("コントロールしなければならない");
      subconscious.push("自分が正しい");

      healing.push("みぞおち（第3チャクラ）に宇宙エネルギーを流す");
      action.push("深呼吸・体を動かす");
    }

    // 不安系
    if(["不安","苦しさ","焦り"].includes(f)){
      chakra.push("第1チャクラ");
      meridian.push("腎経");
      body.push("アストラル体");

      subconscious.push("守られていない");
      subconscious.push("未来は危険");

      healing.push("下腹・足にエネルギーを流す");
      action.push("ゆっくり呼吸・安心に意識");
    }

    // 思考系
    if(["モヤモヤ","混乱","話が聞けない"].includes(f)){
      chakra.push("第6チャクラ");
      meridian.push("胃経");
      body.push("メンタル体");

      subconscious.push("考えないといけない");
      subconscious.push("間違えてはいけない");

      healing.push("眉間にエネルギーを流す");
      action.push("ぼーっとする・情報を遮断");
    }

    // 無気力
    if(["無気力","やりたくない"].includes(f)){
      chakra.push("第7チャクラ");
      body.push("コーザル体");

      subconscious.push("意味がない");
      subconscious.push("どうせ無理");

      healing.push("頭頂にエネルギーを流す");
      action.push("目的を思い出す・軽く行動");
    }

    // 体疲労
    if(["だるい","重い","眠い","きつい"].includes(f)){
      chakra.push("第1チャクラ");
      body.push("エーテル体");

      subconscious.push("休んではいけない");
      subconscious.push("頑張らないといけない");

      healing.push("全身にエネルギーを流す");
      action.push("睡眠・水・休息");
    }

    // 表現系
    if(["口出しすぎ"].includes(f)){
      chakra.push("第5チャクラ");
      body.push("メンタル体");

      subconscious.push("言わないとダメ");
      subconscious.push("正さないといけない");

      healing.push("喉にエネルギーを流す");
      action.push("一呼吸おく・聞く意識");
    }

  });

  // 重複削除
  chakra = [...new Set(chakra)];
  meridian = [...new Set(meridian)];
  body = [...new Set(body)];
  subconscious = [...new Set(subconscious)];
  healing = [...new Set(healing)];
  action = [...new Set(action)];

  document.getElementById("result").innerHTML = `
  <div class="card">
  <b>▼乱れている可能性</b><br><br>
  チャクラ：${chakra.join(" / ")}<br>
  経絡：${meridian.join(" / ")}<br>
  エネルギー体：${body.join(" / ")}<br><br>

  <b>▼修復・変換する潜在意識</b><br>
  ${subconscious.map(s => "・"+s).join("<br>")}<br><br>

  <b>▼ヒーリング</b><br>
  ${healing.map(h => "・"+h).join("<br>")}<br><br>

  <b>▼具体的行動</b><br>
  ${action.map(a => "・"+a).join("<br>")}
  </div>
  `;
}

</script>

</body>
</html>
